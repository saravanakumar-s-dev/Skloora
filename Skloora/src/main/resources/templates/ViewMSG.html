<!DOCTYPE html>
<html>
<head>
    <title>View your messages</title>

    <style>

          body{
            background:#f3f4f6;
            font-family:Arial, sans-serif;
        }

        .card{
            background:white;
            padding:28px;
            border-radius:12px;
            box-shadow:0 6px 20px rgba(0,0,0,.08);
            width:360px;
        }

        h2{
            text-align:center;
            margin-bottom:18px;
        }

        label{
            display:block;
            font-size:13px;
            margin-top:10px;
        }

        input{
            width:100%;
            padding:10px;
            border-radius:8px;
            border:1px solid #d1d5db;
            margin-top:6px;
            box-sizing:border-box;
        }

        button{
            margin-top:16px;
            width:100%;
            padding:10px;
            border-radius:8px;
            border:0;
            background:#2563eb;
            color:white;
            font-weight:600;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }

        p.note{
            font-size:12px;
            color:#374151;
            margin-top:12px;
            text-align:center;
        }

        .login-link{
            display:block;
            text-align:center;
            margin-top:15px;
            text-decoration:none;
            color:#2563eb;
            font-weight:600;
        }

        .login-link:hover{
            text-decoration:underline;
        }

        .header {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            background: linear-gradient(90deg, #0f172a, #1e293b);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: #00d4ff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            box-shadow: 0 0 15px #00d4ff;
        }

        .logo-icon span {
            font-size: 22px;
            font-weight: bold;
            color: #0f172a;
        }

        .brand {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
            color: white;
        }

        .brand span {
            color: #00d4ff;
            text-shadow: 0 0 10px #00d4ff;
        }

    </style>
</head>

<body>

    <center><h1>Messages</h1></center>
    <hr>

    <pre></pre>

    <center>
        <div class="continer">

            <div th:each="msg : ${messages}" class="card">

                <h3 th:text="${msg.sender}">Sender</h3>

                <p>
                    <b>Text: </b>
                    <span th:text="${msg.text}"></span>
                </p>

            </div>

        </div>
    </center>

</body>
</html>
